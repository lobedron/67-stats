<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube статистика + аналитика</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px;
        }
        .video-card {
            text-align: center;
        }
        .thumbnail {
            width: 100%;
            border-radius: 20px;
            background: #eee;
            aspect-ratio: 16/9;
            object-fit: cover;
            margin-bottom: 16px;
        }
        .title {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 12px 0;
            line-height: 1.3;
        }
        .stats {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 12px;
            margin: 16px 0;
            text-align: left;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #ddd;
        }
        .stat:last-child {
            border-bottom: none;
        }
        .growth {
            background: #e8f5e9;
            margin-top: 8px;
            border-radius: 16px;
            padding: 8px 12px;
            text-align: center;
            font-weight: 500;
        }
        .growth.hot {
            background: #fff3e0;
            color: #e67e22;
        }
        .growth.normal {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .growth.slow {
            background: #f5f5f5;
            color: #757575;
        }
        .growth.new {
            background: #e3f2fd;
            color: #1565c0;
        }
        .stat-label {
            font-weight: 500;
        }
        .stat-value {
            font-family: monospace;
            font-weight: bold;
            color: #065fd4;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 20px 0;
        }
        button {
            background: #065fd4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
            background: #0b4c8c;
        }
        .sort-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .sort-buttons button {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }
        .sort-buttons button.active {
            background: #065fd4;
            color: white;
        }
        .refresh-btn, .reset-analytics {
            background: #2c3e50;
            margin-top: 10px;
        }
        .reset-analytics {
            background: #7f8c8d;
        }
        .counter {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 12px;
            color: #555;
        }
        .last-update {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-top: 16px;
        }
        .error {
            color: #d32f2f;
            text-align: center;
            margin: 20px;
        }
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 16px;
            }
            .title {
                font-size: 1.2rem;
            }
            button {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div style="text-align: center; margin-bottom: 16px;">
        <h2>📊 YouTube статистика</h2>
    </div>
    <div id="content">Загрузка...</div>
</div>

<script>
    // ===== НАСТРОЙКИ =====
    const API_KEY = 'AIzaSyCJQp6Yo_tHBJOQAF5JG-lXN7wsTpVDAXk';
    const VIDEO_URLS = [
        "https://www.youtube.com/watch?v=vhbNHMy9w_8",
        "https://www.youtube.com/watch?v=ia9xsw4mACI",
        "https://www.youtube.com/watch?v=il_quDDa3zA",
        "https://www.youtube.com/watch?v=K2cejE7BCGU",
        "https://www.youtube.com/watch?v=sjBK0FrF2Vo",
        "https://www.youtube.com/watch?v=rVWdiVE6Q5A",
        "https://www.youtube.com/watch?v=XVnN3ZBamD8",
        "https://www.youtube.com/watch?v=O_7SX7lToRc",
        "https://www.youtube.com/watch?v=SaA_cVSHEHg",
        "https://www.youtube.com/watch?v=6PEz4pt_gzE",
        "https://www.youtube.com/watch?v=38v0Tmc_Oro",
        "https://www.youtube.com/watch?v=w7sYCnbAufY"
    ];
    // =========================

    let allVideos = [];
    let currentList = [];
    let currentIndex = 0;
    let lastUpdateTime = null;

    // Хранилище для аналитики (в localStorage)
    let analytics = {};

    function loadAnalytics() {
        const saved = localStorage.getItem('youtube_analytics');
        if (saved) {
            analytics = JSON.parse(saved);
        } else {
            analytics = {};
        }
    }

    function saveAnalytics() {
        localStorage.setItem('youtube_analytics', JSON.stringify(analytics));
    }

    function updateAnalytics(videoId, currentViews) {
        const now = Date.now();
        const hour = 60 * 60 * 1000;
        
        if (!analytics[videoId]) {
            analytics[videoId] = {
                lastViews: currentViews,
                lastUpdate: now,
                history: []
            };
        } else {
            const prev = analytics[videoId];
            const timeDiff = now - prev.lastUpdate;
            const viewsDiff = currentViews - prev.lastViews;
            
            // Сохраняем данные за последний час
            if (timeDiff >= hour || viewsDiff > 0) {
                analytics[videoId] = {
                    lastViews: currentViews,
                    lastUpdate: now,
                    history: [{
                        views: currentViews,
                        timestamp: now,
                        diff: viewsDiff,
                        timeDiff: timeDiff
                    }, ...(prev.history || []).slice(0, 23)] // храним последние 24 записи
                };
            }
        }
        saveAnalytics();
    }

    function getGrowthText(videoId, currentViews) {
        const data = analytics[videoId];
        if (!data || !data.history || data.history.length === 0) {
            return { text: "🆕 Первый замер", class: "new" };
        }
        
        const latest = data.history[0];
        const hoursDiff = latest.timeDiff / (60 * 60 * 1000);
        
        if (latest.diff === undefined || latest.diff === 0) {
            return { text: "📊 Нет изменений", class: "slow" };
        }
        
        const perHour = Math.round(latest.diff / hoursDiff);
        
        if (perHour >= 100) {
            return { text: `🔥 +${perHour} просмотров/час`, class: "hot" };
        } else if (perHour >= 20) {
            return { text: `📈 +${perHour} просмотров/час`, class: "normal" };
        } else {
            return { text: `📉 +${perHour} просмотров/час`, class: "slow" };
        }
    }

    function extractVideoId(url) {
        const match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
        return match ? match[1] : null;
    }

    async function fetchAllVideos() {
        const ids = VIDEO_URLS.map(extractVideoId).filter(id => id);
        if (!ids.length) throw new Error("Нет корректных ссылок");

        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids.join(',')}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.items) throw new Error("Ошибка API, проверьте ключ");

        const now = Date.now();
        const videos = data.items.map(item => ({
            id: item.id,
            title: item.snippet.title,
            thumb: item.snippet.thumbnails.high.url,
            views: parseInt(item.statistics.viewCount || 0),
            likes: parseInt(item.statistics.likeCount || 0),
            comments: parseInt(item.statistics.commentCount || 0),
            url: `https://youtu.be/${item.id}`
        }));
        
        // Обновляем аналитику
        videos.forEach(v => {
            updateAnalytics(v.id, v.views);
        });
        
        lastUpdateTime = now;
        return videos;
    }

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function formatTime() {
        if (!lastUpdateTime) return "не обновлено";
        const date = new Date(lastUpdateTime);
        return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function render() {
        const video = currentList[currentIndex];
        if (!video) {
            document.getElementById('content').innerHTML = '<div class="error">Нет данных</div>';
            return;
        }

        const growth = getGrowthText(video.id, video.views);
        const total = currentList.length;
        const html = `
            <div class="video-card">
                <img class="thumbnail" src="${video.thumb}" alt="thumbnail" loading="lazy">
                <div class="title">${escapeHtml(video.title)}</div>
                <div class="stats">
                    <div class="stat"><span class="stat-label">👁 Просмотры</span><span class="stat-value">${formatNumber(video.views)}</span></div>
                    <div class="stat"><span class="stat-label">❤️ Лайки</span><span class="stat-value">${formatNumber(video.likes)}</span></div>
                    <div class="stat"><span class="stat-label">💬 Комментарии</span><span class="stat-value">${formatNumber(video.comments)}</span></div>
                    <div class="growth ${growth.class}">${growth.text}</div>
                </div>
                <div class="nav-buttons">
                    <button id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.5"' : ''}>⬅️ Назад</button>
                    <button id="nextBtn" ${currentIndex === total-1 ? 'disabled style="opacity:0.5"' : ''}>Вперед ➡️</button>
                </div>
                <div class="sort-buttons">
                    <button id="sortViewsBtn" class="${currentList === allVideos ? '' : 'active'}">📊 По просмотрам</button>
                    <button id="resetOrderBtn" class="${currentList === allVideos ? 'active' : ''}">🔄 Исходный порядок</button>
                </div>
                <button id="refreshBtn" class="refresh-btn">🔄 Обновить данные</button>
                <button id="resetAnalyticsBtn" class="reset-analytics">🗑️ Сбросить аналитику</button>
                <div class="counter">${currentIndex+1} / ${total}</div>
                <div class="last-update">🕒 Последнее обновление: ${formatTime()}</div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                render();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex < currentList.length - 1) {
                currentIndex++;
                render();
            }
        });
        document.getElementById('sortViewsBtn')?.addEventListener('click', async () => {
            await refreshData();
            const sorted = [...allVideos].sort((a,b) => b.views - a.views);
            currentList = sorted;
            currentIndex = 0;
            render();
        });
        document.getElementById('resetOrderBtn')?.addEventListener('click', async () => {
            await refreshData();
            currentList = allVideos;
            currentIndex = 0;
            render();
        });
        document.getElementById('refreshBtn')?.addEventListener('click', async () => {
            await refreshData();
            currentList = (currentList === allVideos) ? allVideos : [...allVideos].sort((a,b)=>b.views - a.views);
            currentIndex = 0;
            render();
        });
        document.getElementById('resetAnalyticsBtn')?.addEventListener('click', () => {
            if (confirm('Сбросить всю аналитику? Данные о скорости набора просмотров будут удалены.')) {
                analytics = {};
                saveAnalytics();
                refreshData().then(() => {
                    currentList = allVideos;
                    currentIndex = 0;
                    render();
                });
            }
        });
    }

    async function refreshData() {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '<div style="text-align:center">⏳ Обновление...</div>';
        try {
            const fresh = await fetchAllVideos();
            const ordered = [];
            for (let url of VIDEO_URLS) {
                const id = extractVideoId(url);
                const found = fresh.find(v => v.id === id);
                if (found) ordered.push(found);
            }
            allVideos = ordered;
            if (currentList === undefined) currentList = allVideos;
        } catch (err) {
            contentDiv.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
            throw err;
        }
    }

    async function init() {
        loadAnalytics();
        try {
            await refreshData();
            currentList = allVideos;
            currentIndex = 0;
            render();
        } catch (err) {
            document.getElementById('content').innerHTML = `<div class="error">Не удалось загрузить данные. Проверьте API ключ и ссылки.</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    init();
</script>
</body>
</html>
