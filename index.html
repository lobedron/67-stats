<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lob Analytics — Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --accent: #ffffff;
            --text-secondary: #888;
            --border: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            font-family: 'Geologica', sans-serif;
            color: #e0e0e0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Шапка канала */
        .channel-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }

        .channel-info h2 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .channel-info p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Основная лента */
        .feed-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .video-item {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .video-item:active {
            transform: scale(0.98);
        }

        .thumb-wrapper {
            position: relative;
            aspect-ratio: 16/9;
            background: #1a1a1a;
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-content {
            padding: 16px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 12px;
            color: #f0f0f0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .quick-stats {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .quick-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Модальное окно (Детали) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        .modal.active { display: flex; }

        .modal-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .close-btn {
            background: var(--border);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .modal-body {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .chart-card {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-box .label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .stat-box .val { font-size: 1.2rem; font-weight: 600; }

        .growth-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .growth-up { background: #1a2e1a; color: #4ade80; }
        .growth-wait { background: #1a1a2e; color: #60a5fa; }

        @media (min-width: 768px) {
            .feed-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="channel-header">
    <img src="" id="chAvatar" class="channel-avatar" alt="">
    <div class="channel-info">
        <h2 id="chName">Загрузка...</h2>
        <p id="chMeta">@xraygame</p>
    </div>
</div>

<div class="feed-container" id="videoFeed">
    </div>

<div class="modal" id="statsModal">
    <div class="modal-header">
        <span style="font-weight: 600;">Аналитика видео</span>
        <button class="close-btn" onclick="closeModal()">Закрыть</button>
    </div>
    <div class="modal-body">
        <div id="modalThumb" class="thumb-wrapper" style="border-radius: 20px; margin-bottom: 16px;"></div>
        <h2 id="modalTitle" style="font-size: 1.2rem; margin-bottom: 8px;"></h2>
        
        <div id="modalGrowth"></div>

        <div class="chart-card">
            <canvas id="detailChart"></canvas>
        </div>

        <div class="stats-grid" id="modalStatsGrid">
            </div>

        <a href="" id="modalYTLink" target="_blank" style="display: block; text-align: center; margin-top: 24px; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; background: var(--border); padding: 12px; border-radius: 16px;">Открыть в приложении YouTube</a>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyCJQp6Yo_tHBJOQAF5JG-lXN7wsTpVDAXk';
    const HANDLE = 'xraygame';
    
    let allVideos = [];
    let analytics = JSON.parse(localStorage.getItem('lob_analytics_v3') || '{}');
    let currentChart = null;

    async function init() {
        try {
            // 1. Инфо канала
            const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&forHandle=${HANDLE}&key=${API_KEY}`);
            const chData = await chRes.json();
            const channel = chData.items[0];
            
            document.getElementById('chName').innerText = channel.snippet.title;
            document.getElementById('chAvatar').src = channel.snippet.thumbnails.default.url;
            document.getElementById('chMeta').innerText = `@${HANDLE} • ${parseInt(channel.statistics.subscriberCount).toLocaleString()} сабов`;

            // 2. Список видео
            const uploadId = channel.contentDetails.relatedPlaylists.uploads;
            const vRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadId}&maxResults=40&key=${API_KEY}`);
            const vData = await vRes.json();
            
            const videoIds = vData.items.map(i => i.snippet.resourceId.videoId);
            const sRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds.join(',')}&key=${API_KEY}`);
            const sData = await sRes.json();

            const statsMap = {};
            sData.items.forEach(i => statsMap[i.id] = i.statistics);

            allVideos = vData.items.map(item => {
                const id = item.snippet.resourceId.videoId;
                const vStats = statsMap[id];
                const videoObj = {
                    id: id,
                    title: item.snippet.title,
                    thumb: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url,
                    views: parseInt(vStats.viewCount || 0),
                    likes: parseInt(vStats.likeCount || 0),
                    comments: parseInt(vStats.commentCount || 0),
                    published: item.snippet.publishedAt
                };
                updateLocalHistory(id, videoObj.views);
                return videoObj;
            });

            renderFeed();
        } catch (e) {
            console.error(e);
            document.getElementById('videoFeed').innerHTML = "Ошибка доступа. Проверь API ключ.";
        }
    }

    function updateLocalHistory(id, views) {
        const now = Date.now();
        if (!analytics[id]) analytics[id] = { history: [] };
        const last = analytics[id].history[0];
        if (!last || last.views !== views) {
            analytics[id].history.unshift({ views, timestamp: now });
            if (analytics[id].history.length > 50) analytics[id].history.pop();
            localStorage.setItem('lob_analytics_v3', JSON.stringify(analytics));
        }
    }

    function renderFeed() {
        const container = document.getElementById('videoFeed');
        container.innerHTML = allVideos.map(v => `
            <div class="video-item" onclick="openDetails('${v.id}')">
                <div class="thumb-wrapper">
                    <img src="${v.thumb}" loading="lazy">
                </div>
                <div class="video-content">
                    <div class="video-title">${v.title}</div>
                    <div class="quick-stats">
                        <span>👁 ${v.views.toLocaleString()}</span>
                        <span>👍 ${v.likes.toLocaleString()}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openDetails(id) {
        const v = allVideos.find(x => x.id === id);
        const modal = document.getElementById('statsModal');
        const history = analytics[id]?.history || [];
        
        document.getElementById('modalTitle').innerText = v.title;
        document.getElementById('modalThumb').innerHTML = `<img src="${v.thumb}" style="width:100%; border-radius:20px;">`;
        document.getElementById('modalYTLink').href = `https://youtu.be/${id}`;
        
        // Рост
        const growthDiv = document.getElementById('modalGrowth');
        if (history.length > 1) {
            const last = history[0];
            const prev = history[1];
            const diff = last.views - prev.views;
            const hours = (last.timestamp - prev.timestamp) / 3600000;
            const perHour = Math.round(diff / (hours || 1));
            growthDiv.innerHTML = `<div class="growth-badge growth-up">📈 +${perHour} просм. / час</div>`;
        } else {
            growthDiv.innerHTML = `<div class="growth-badge growth-wait">⏳ собираем данные...</div>`;
        }

        // Статы
        document.getElementById('modalStatsGrid').innerHTML = `
            <div class="stat-box"><div class="label">Просмотры</div><div class="val">${v.views.toLocaleString()}</div></div>
            <div class="stat-box"><div class="label">Лайки</div><div class="val">${v.likes.toLocaleString()}</div></div>
            <div class="stat-box"><div class="label">Комменты</div><div class="val">${v.comments.toLocaleString()}</div></div>
            <div class="stat-box"><div class="label">Дней в эфире</div><div class="val">${Math.floor((Date.now() - new Date(v.published))/86400000)}</div></div>
        `;

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';

        // График
        setTimeout(() => renderChart(history), 100);
    }

    function renderChart(history) {
        const ctx = document.getElementById('detailChart').getContext('2d');
        if (currentChart) currentChart.destroy();

        const data = [...history].reverse();
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(i => new Date(i.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})),
                datasets: [{
                    label: 'Просмотры',
                    data: data.map(i => i.views),
                    borderColor: '#fff',
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(255,255,255,0.05)'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#555', maxRotation: 0 }, grid: { display: false } },
                    y: { ticks: { color: '#555' }, grid: { color: '#1a1a1a' } }
                }
            }
        });
    }

    function closeModal() {
        document.getElementById('statsModal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    init();
</script>

</body>
</html>
