<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Lob Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #111;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 16px;
            color: #e0e0e0;
        }

        .app {
            max-width: 560px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .header {
            padding: 20px 20px 12px 20px;
            border-bottom: 1px solid #2a2a2a;
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f0f0, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            font-size: 0.75rem;
            color: #6a6a6a;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            padding: 12px 20px 0 20px;
            gap: 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        .tab {
            font-size: 0.9rem;
            font-weight: 500;
            padding-bottom: 8px;
            color: #8a8a8a;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to   { opacity: 1; transform: translateY(0);}
        }

        /* карточка видео с анимацией */
        .video-card {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .video-card.fade-out {
            opacity: 0;
            transform: translateX(8px);
        }
        .video-card.fade-in {
            opacity: 1;
            transform: translateX(0);
        }

        .thumbnail {
            width: 100%;
            border-radius: 20px;
            background: #2a2a2a;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .video-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 12px 0 8px;
            line-height: 1.35;
            color: #f0f0f0;
        }
        .stats-grid {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 16px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .stat-item {
            flex: 1;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8a8a8a;
        }
        .stat-number {
            font-size: 1.4rem;
            font-weight: 600;
            font-family: monospace;
            color: #e0e0e0;
        }
        .growth-badge {
            margin-top: 8px;
            font-size: 0.75rem;
            background: #222;
            border-radius: 40px;
            padding: 6px 12px;
            display: inline-block;
            width: auto;
            text-align: center;
        }
        .growth-badge.hot { background: #2c1a0c; color: #e67e22; }
        .growth-badge.normal { background: #1a2a1a; color: #6fbf6f; }
        .growth-badge.slow { background: #222; color: #aaa; }
        .growth-badge.wait { background: #0a2a3a; color: #5dade2; }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
        }
        button {
            background: #2a2a2a;
            border: none;
            padding: 12px 16px;
            border-radius: 44px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e0e0e0;
            flex: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
            background: #3a3a3a;
        }
        .primary-btn {
            background: #3a3a3a;
            color: white;
        }
        .secondary-btn {
            background: #222;
            color: #ccc;
        }
        .counter {
            text-align: center;
            font-size: 0.75rem;
            color: #6a6a6a;
            margin: 12px 0;
        }
        .last-update {
            text-align: center;
            font-size: 0.7rem;
            color: #5a5a5a;
            margin-top: 16px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .filter-chip {
            background: #222;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }
        .filter-chip.active {
            background: #3a3a3a;
            color: white;
        }
        .center-btn {
            display: flex;
            justify-content: center;
            margin: 20px 0 12px;
        }
        .center-btn button {
            max-width: 220px;
        }

        .youtube-link {
            display: inline-block;
            background: #222;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #aaa;
            text-decoration: none;
            margin-top: 12px;
            transition: 0.1s;
        }
        .youtube-link:active {
            background: #3a3a3a;
        }

        .chart-container {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 12px;
            margin: 12px 0;
        }
        canvas {
            max-height: 220px;
            width: 100%;
        }

        .footer {
            text-align: right;
            padding: 12px 20px 20px;
            font-size: 0.65rem;
            color: #4a4a4a;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .stat-number { font-size: 1.2rem; }
            .video-title { font-size: 1rem; }
            .filter-chip { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Lob Analytics</h1>
        <p>мониторинг просмотров и динамики</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="stats">Статистика</div>
        <div class="tab" data-tab="chart">График</div>
        <div class="tab" data-tab="insights">Аналитика</div>
    </div>

    <div id="statsTab" class="tab-content active">
        <div id="videoCardContainer"></div>
        <div class="nav-buttons">
            <button id="prevBtn" class="secondary-btn">◀ Назад</button>
            <button id="nextBtn" class="secondary-btn">Вперёд ▶</button>
        </div>
        <div class="filter-group">
            <div class="filter-chip active" data-sort="original">Исходный</div>
            <div class="filter-chip" data-sort="views">По просмотрам</div>
            <div class="filter-chip" data-sort="growth">По росту (час)</div>
        </div>
        <div class="center-btn">
            <button id="refreshBtn" class="primary-btn">⟳ Обновить данные</button>
        </div>
        <div class="counter" id="videoCounter"></div>
        <div class="last-update" id="lastUpdateTime"></div>
    </div>

    <div id="chartTab" class="tab-content">
        <div class="video-title" id="chartVideoTitle">Выберите видео</div>
        <div class="chart-container">
            <canvas id="viewsChart" width="400" height="200"></canvas>
        </div>
        <div class="stats-grid" id="chartStats"></div>
        <div class="center-btn">
            <button id="refreshChartBtn" class="primary-btn">⟳ Обновить график</button>
        </div>
    </div>

    <div id="insightsTab" class="tab-content">
        <div id="insightsList"></div>
    </div>

    <div class="footer">
        <span>lobedron</span> &nbsp;|&nbsp; <span id="version">v2.2</span>
    </div>
</div>

<script>
    // ---------- КОНФИГ ----------
    const API_KEY = 'AIzaSyCJQp6Yo_tHBJOQAF5JG-lXN7wsTpVDAXk';
    const VIDEO_URLS = [
        "https://www.youtube.com/watch?v=vhbNHMy9w_8",
        "https://www.youtube.com/watch?v=ia9xsw4mACI",
        "https://www.youtube.com/watch?v=il_quDDa3zA",
        "https://www.youtube.com/watch?v=K2cejE7BCGU",
        "https://www.youtube.com/watch?v=sjBK0FrF2Vo",
        "https://www.youtube.com/watch?v=rVWdiVE6Q5A",
        "https://www.youtube.com/watch?v=XVnN3ZBamD8",
        "https://www.youtube.com/watch?v=O_7SX7lToRc",
        "https://www.youtube.com/watch?v=SaA_cVSHEHg",
        "https://www.youtube.com/watch?v=6PEz4pt_gzE",
        "https://www.youtube.com/watch?v=38v0Tmc_Oro",
        "https://www.youtube.com/watch?v=w7sYCnbAufY"
    ];

    let allVideos = [];
    let currentList = [];
    let currentIndex = 0;
    let lastUpdateTime = null;
    let analytics = {};
    let viewsChart = null;
    let animationInProgress = false;

    // ---------- Вспомогательные ----------
    function extractVideoId(url) {
        const match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
        return match ? match[1] : null;
    }

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function formatTime(timestamp) {
        if (!timestamp) return "—";
        const date = new Date(timestamp);
        return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    // ---------- Аналитика ----------
    function loadAnalytics() {
        const saved = localStorage.getItem('lob_analytics');
        if (saved) analytics = JSON.parse(saved);
        else analytics = {};
    }
    function saveAnalytics() {
        localStorage.setItem('lob_analytics', JSON.stringify(analytics));
    }

    function updateAnalytics(videoId, currentViews) {
        const now = Date.now();
        if (!analytics[videoId]) analytics[videoId] = { history: [] };
        const prev = analytics[videoId];
        const lastEntry = prev.history[0];
        if (!lastEntry || (now - lastEntry.timestamp > 30 * 60 * 1000) || lastEntry.views !== currentViews) {
            prev.history.unshift({ views: currentViews, timestamp: now });
            if (prev.history.length > 50) prev.history.pop();
        }
        saveAnalytics();
    }

    function getGrowthRate(videoId, currentViews) {
        const data = analytics[videoId];
        if (!data || data.history.length < 2) return null;
        const latest = data.history[0];
        const prev = data.history[1];
        const hoursDiff = (latest.timestamp - prev.timestamp) / (60 * 60 * 1000);
        if (hoursDiff <= 0) return null;
        const diff = latest.views - prev.views;
        const perHour = Math.round(diff / hoursDiff);
        return { perHour, diff, hours: hoursDiff };
    }

    // ---------- YouTube API ----------
    async function fetchAllVideos() {
        const ids = VIDEO_URLS.map(extractVideoId).filter(id => id);
        if (!ids.length) throw new Error("Нет ссылок");
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids.join(',')}&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.items) throw new Error("Ошибка API");
        const now = Date.now();
        const videos = data.items.map(item => ({
            id: item.id,
            title: item.snippet.title,
            thumb: item.snippet.thumbnails.high.url,
            views: parseInt(item.statistics.viewCount || 0),
            likes: parseInt(item.statistics.likeCount || 0),
            comments: parseInt(item.statistics.commentCount || 0),
            url: `https://youtu.be/${item.id}`
        }));
        videos.forEach(v => updateAnalytics(v.id, v.views));
        lastUpdateTime = now;
        return videos;
    }

    async function refreshData() {
        try {
            const fresh = await fetchAllVideos();
            const ordered = [];
            for (let url of VIDEO_URLS) {
                const id = extractVideoId(url);
                const found = fresh.find(v => v.id === id);
                if (found) ordered.push(found);
            }
            allVideos = ordered;
            const currentSort = document.querySelector('.filter-chip.active')?.dataset.sort || 'original';
            if (currentSort === 'views') currentList = [...allVideos].sort((a,b) => b.views - a.views);
            else if (currentSort === 'growth') {
                currentList = [...allVideos].sort((a,b) => {
                    const gA = getGrowthRate(a.id, a.views)?.perHour || 0;
                    const gB = getGrowthRate(b.id, b.views)?.perHour || 0;
                    return gB - gA;
                });
            } else currentList = [...allVideos];
            if (currentIndex >= currentList.length) currentIndex = 0;
            renderCurrentTab();
        } catch(e) {
            console.error(e);
            document.getElementById('videoCardContainer').innerHTML = `<div style="color:#ff8a8a">❌ Ошибка загрузки: ${e.message}</div>`;
        }
    }

    // ---------- Построение HTML карточки ----------
    function buildVideoCardHTML(video) {
        const growth = getGrowthRate(video.id, video.views);
        let growthHtml = '';
        if (growth) {
            let cls = 'slow';
            let text = `📉 ${growth.perHour} просм/час`;
            if (growth.perHour >= 100) { cls = 'hot'; text = `🔥 ${growth.perHour} просм/час`; }
            else if (growth.perHour >= 20) { cls = 'normal'; text = `📈 ${growth.perHour} просм/час`; }
            growthHtml = `<div class="growth-badge ${cls}">${text}</div>`;
        } else {
            growthHtml = `<div class="growth-badge wait">⏳ накопление данных…</div>`;
        }

        return `
            <div class="video-card" id="videoCard">
                <img class="thumbnail" src="${video.thumb}" alt="preview" loading="lazy">
                <div class="video-title">${escapeHtml(video.title)}</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-label">ПРОСМОТРЫ</div><div class="stat-number">${formatNumber(video.views)}</div></div>
                    <div class="stat-item"><div class="stat-label">ЛАЙКИ</div><div class="stat-number">${formatNumber(video.likes)}</div></div>
                    <div class="stat-item"><div class="stat-label">КОММЕНТАРИИ</div><div class="stat-number">${formatNumber(video.comments)}</div></div>
                </div>
                ${growthHtml}
                <a href="${video.url}" target="_blank" class="youtube-link">🔗 Смотреть на YouTube</a>
            </div>
        `;
    }

    // ---------- Отрисовка статистики с анимацией ----------
    function renderStatsTab(animate = true) {
        if (currentList.length === 0) return;
        const video = currentList[currentIndex];
        if (!video) return;

        const container = document.getElementById('videoCardContainer');
        const newHtml = buildVideoCardHTML(video);

        if (!animate) {
            container.innerHTML = newHtml;
            document.getElementById('videoCounter').innerHTML = `${currentIndex+1} / ${currentList.length}`;
            document.getElementById('lastUpdateTime').innerHTML = `🕒 обновлено: ${formatTime(lastUpdateTime)}`;
            return;
        }

        // Если анимация уже идёт, не запускаем новую
        if (animationInProgress) return;
        const oldCard = document.querySelector('#videoCard');
        if (!oldCard) {
            container.innerHTML = newHtml;
            document.getElementById('videoCounter').innerHTML = `${currentIndex+1} / ${currentList.length}`;
            document.getElementById('lastUpdateTime').innerHTML = `🕒 обновлено: ${formatTime(lastUpdateTime)}`;
            return;
        }

        animationInProgress = true;
        oldCard.classList.add('fade-out');
        setTimeout(() => {
            container.innerHTML = newHtml;
            document.getElementById('videoCounter').innerHTML = `${currentIndex+1} / ${currentList.length}`;
            document.getElementById('lastUpdateTime').innerHTML = `🕒 обновлено: ${formatTime(lastUpdateTime)}`;
            // Добавляем плавное появление
            const newCard = document.querySelector('#videoCard');
            if (newCard) {
                newCard.classList.add('fade-in');
                setTimeout(() => {
                    if (newCard) newCard.classList.remove('fade-in');
                }, 200);
            }
            animationInProgress = false;
        }, 200);
    }

    // ---------- График ----------
    function renderChartTab() {
        const video = currentList[currentIndex];
        if (!video) return;
        document.getElementById('chartVideoTitle').innerText = video.title;
        const history = analytics[video.id]?.history || [];
        const points = history.slice().reverse();
        const labels = points.map(p => formatTime(p.timestamp));
        const data = points.map(p => p.views);
        const ctx = document.getElementById('viewsChart').getContext('2d');
        if (viewsChart) viewsChart.destroy();
        viewsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Просмотры',
                    data: data,
                    borderColor: '#b0b0b0',
                    backgroundColor: 'rgba(80,80,80,0.2)',
                    tension: 0.2,
                    pointRadius: 2,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
                scales: { y: { ticks: { color: '#aaa' }, grid: { color: '#2a2a2a' } },
                          x: { ticks: { color: '#aaa', maxRotation: 45, autoSkip: true } } }
            }
        });
        const lastViews = history[0]?.views || video.views;
        const firstViews = history[history.length-1]?.views || lastViews;
        const totalGain = lastViews - firstViews;
        document.getElementById('chartStats').innerHTML = `
            <div class="stat-item"><div class="stat-label">ЗА ВЕСЬ ПЕРИОД</div><div class="stat-number">${formatNumber(totalGain)}</div></div>
            <div class="stat-item"><div class="stat-label">ТЕКУЩИЕ</div><div class="stat-number">${formatNumber(lastViews)}</div></div>
        `;
    }

    // ---------- Аналитика (рейтинг) ----------
    function renderInsightsTab() {
        const sorted = [...allVideos].sort((a,b) => {
            const gA = getGrowthRate(a.id, a.views)?.perHour || 0;
            const gB = getGrowthRate(b.id, b.views)?.perHour || 0;
            return gB - gA;
        });
        let html = `<div style="font-size:0.8rem; margin-bottom:12px;">📊 Рейтинг по скорости роста (просмотров в час)</div>`;
        sorted.forEach((v, idx) => {
            const growth = getGrowthRate(v.id, v.views);
            let rate = growth ? `${growth.perHour}` : '—';
            let cls = '';
            if (growth && growth.perHour >= 100) cls = '🔥';
            else if (growth && growth.perHour >= 20) cls = '📈';
            else if (growth) cls = '⏳';
            html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #2a2a2a;">
                        <span style="flex:1; font-size:0.85rem;">${idx+1}. ${escapeHtml(v.title.slice(0,45))}</span>
                        <span style="font-family:monospace;">${cls} ${rate}</span>
                     </div>`;
        });
        document.getElementById('insightsList').innerHTML = html;
    }

    function renderCurrentTab() {
        const activeTab = document.querySelector('.tab.active').dataset.tab;
        if (activeTab === 'stats') renderStatsTab(true);
        else if (activeTab === 'chart') renderChartTab();
        else if (activeTab === 'insights') renderInsightsTab();
    }

    // ---------- Сортировка ----------
    function setSort(sortType) {
        if (sortType === 'original') currentList = [...allVideos];
        else if (sortType === 'views') currentList = [...allVideos].sort((a,b) => b.views - a.views);
        else if (sortType === 'growth') currentList = [...allVideos].sort((a,b) => {
            const gA = getGrowthRate(a.id, a.views)?.perHour || 0;
            const gB = getGrowthRate(b.id, b.views)?.perHour || 0;
            return gB - gA;
        });
        currentIndex = 0;
        renderCurrentTab();
    }

    // ---------- Навигация с анимацией ----------
    function changeVideo(delta) {
        if (animationInProgress) return;
        const newIndex = currentIndex + delta;
        if (newIndex >= 0 && newIndex < currentList.length) {
            currentIndex = newIndex;
            renderStatsTab(true);
        }
    }

    // ---------- Инициализация ----------
    function init() {
        loadAnalytics();
        refreshData().then(() => {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
                    renderCurrentTab();
                });
            });
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    setSort(chip.dataset.sort);
                });
            });
            document.getElementById('prevBtn').onclick = () => changeVideo(-1);
            document.getElementById('nextBtn').onclick = () => changeVideo(1);
            document.getElementById('refreshBtn').onclick = () => refreshData().then(() => renderCurrentTab());
            document.getElementById('refreshChartBtn').onclick = () => refreshData().then(() => renderChartTab());
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    init();
</script>
</body>
</html>
